name: Auto Update Playlist

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '*/15 * * * *'

jobs:
  scrape-live-matches:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 চেকআউট পাবলিক রিপোজিটরি
        uses: actions/checkout@v4

      - name: 🔐 চেকআউট প্রাইভেট রিপোজিটরি (Sports)
        uses: actions/checkout@v4
        with:
          repository: srhady/Sports
          token: ${{ secrets.PAT_TOKEN }} # 🎯 সংশোধিত লাইন
          path: private_script_folder

      - name: 🟢 Node.js সেটআপ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 ডিপেন্ডেন্সি ইনস্টল
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth cheerio

      - name: 🚀 স্ক্র্যাপার রান করা
        run: node private_script_folder/scraper.js

      - name: 🗄️ প্রাইভেট স্টোরেজ রিপোতে .m3u8 ফাইল পাঠানো (bingstream-srt)
        env:
          REPO_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git clone https://x-access-token:${REPO_TOKEN}@github.com/srhady/bingstream-srt.git storage_dir
          
          mv match_*.m3u8 storage_dir/ 2>/dev/null || echo "কোনো নতুন m3u8 ফাইল পাওয়া যায়নি।"
          
          cd storage_dir
          git add .
          git commit -m "Auto added secure vercel streams" || echo "No changes to commit"
          git push origin main

      - name: 🕒 README-তে বিডি সময় আপডেট করা
        run: |
          CUR_TIME=$(TZ='Asia/Dhaka' date +'%I:%M %p, %d %b %Y')
          sed -i "s|last--commit--time-.*-blue|last--commit--time-${CUR_TIME// /%20}-blue|g" README.md

      - name: 💾 প্লেলিস্ট ও রিডমি গিটহাবে পুশ করা
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add playlist.m3u || true
          git add playlist.json || true
          git add README.md || true
          
          git commit -m "Auto Update Playlist & BD Time: $(TZ='Asia/Dhaka' date +'%I:%M %p')" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push
